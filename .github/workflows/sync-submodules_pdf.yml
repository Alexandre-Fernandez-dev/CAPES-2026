name: Sync sous-modules
 
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
 
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout avec sous-modules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Réécrire les URLs SSH en HTTPS pour le runner
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
 
      - name: Mettre à jour tous les sous-modules
        run: |
          git submodule update --remote --merge
 
      - name: Copier les PDFs de chaque sous-module vers Others/
        run: |
          git submodule foreach '
            SUBMODULE_NAME=$(basename "$displaypath")
            SRC="$displaypath/pdf_output"
            DEST="Others/$SUBMODULE_NAME"
 
            if [ -d "$SRC" ]; then
              mkdir -p "$DEST"
              rsync -av \
                --include="*/" \
                --include="*.pdf" \
                --exclude="*" \
                --prune-empty-dirs \
                "$SRC/" "$DEST/"
              echo "PDFs copiés : $SRC -> $DEST"
            else
              echo "Pas de pdf_output dans $SUBMODULE_NAME, ignoré."
            fi
          '
 
      - name: Commit et push si des changements existent
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git add Others/
          git add Alexandre/ Roxane/
          git diff --cached --quiet || git commit -m "ci: sync sous-modules et PDFs [skip ci]"
          git push
