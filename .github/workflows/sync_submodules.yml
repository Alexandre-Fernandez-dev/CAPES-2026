name: Sync sous-modules et PDFs

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'  # Vérifie toutes les 15 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo parent avec sous-modules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mettre à jour tous les sous-modules
        run: |
          git submodule update --remote --merge

      - name: Copier les PDFs de chaque sous-module vers Others/
        run: |
          # Pour chaque sous-module, copie ses PDFs dans Others/<nom-du-sous-module>/
          git submodule foreach '
            SUBMODULE_NAME=$(basename "$displaypath")
            SRC="$displaypath/pdf_output"
            DEST="Others/$SUBMODULE_NAME"

            if [ -d "$SRC" ]; then
              mkdir -p "$DEST"
              rsync -av --include="*.pdf" --exclude="*" "$SRC/" "$DEST/"
              echo "PDFs copiés : $SRC -> $DEST"
            else
              echo "Pas de pdf_output dans $SUBMODULE_NAME, ignoré."
            fi
          '

      - name: Commit et push si des changements existent
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Others/
          git add .gitmodules
          # Ajoute les pointeurs de sous-modules mis à jour
          git submodule foreach 'git -C "$toplevel" add "$displaypath"'

          git diff --cached --quiet || git commit -m "ci: sync sous-modules et PDFs [skip ci]"
          git push
