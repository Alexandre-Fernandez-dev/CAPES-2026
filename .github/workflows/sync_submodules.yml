name: Sync PDFs depuis sous-module Alexandre

on:
  repository_dispatch:
    types: [submodule-pdf-updated]

  workflow_dispatch:   # Pour lancer manuellement si besoin

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo parent avec sous-modules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mettre à jour le sous-module à la dernière version
        run: |
          git submodule update --remote --merge

      - name: Copier les PDFs vers Others/Alexandre
        run: |
          DEST="Others/Alexandre"
          mkdir -p "$DEST"

          # Chemin vers le pdf_output du sous-module (à adapter si le sous-module est dans un sous-dossier)
          SRC="Alexandre/pdf_output"   #

          if [ ! -d "$SRC" ]; then
            echo "Dossier source introuvable : $SRC"
            exit 1
          fi

          # Copie en préservant l'arborescence
          rsync -av --include='*.pdf' --exclude='*' "$SRC/" "$DEST/"

          echo "PDFs copiés depuis $SRC vers $DEST"

      - name: Commit et push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Others/Alexandre/
          git add CHEMIN/VERS/SOUS-MODULE   # Met à jour le pointeur du submodule
          git diff --cached --quiet || git commit -m "ci: sync PDFs Alexandre [skip ci]"
          git push
