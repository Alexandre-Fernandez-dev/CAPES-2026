name: Sync Others/ → Google Drive

on:
  push:
    branches:
      - main
    paths:
      - 'Others/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configurer rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Sync Others/ → Drive
        run: |
          rclone sync Others/ gdrive-capes: \
            --transfers 4 \
            --checkers 8 \
            --drive-chunk-size 32M \
            --log-level INFO
