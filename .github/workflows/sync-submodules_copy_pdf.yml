name: Sync sous-modules

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout avec sous-modules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Réécrire les URLs SSH en HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Mettre à jour tous les sous-modules
        run: git submodule update --remote --merge

      - name: Copier les PDFs de chaque sous-module vers Others/
        run: |
          # Lire les chemins des sous-modules depuis .gitmodules
          git config --file .gitmodules --get-regexp 'submodule\..*\.path' | awk '{print $2}' | while IFS= read -r SUBMODULE_PATH; do
            SUBMODULE_NAME=$(basename "$SUBMODULE_PATH")
            SRC="$SUBMODULE_PATH/pdf_output"
            DEST="Others/$SUBMODULE_NAME"

            echo "Sous-module : $SUBMODULE_NAME"
            echo "  Source    : $SRC"
            echo "  Dest      : $DEST"

            if [ -d "$SRC" ]; then
              mkdir -p "$DEST"
              rsync -av \
                --include="*/" \
                --include="*.pdf" \
                --exclude="*" \
                --prune-empty-dirs \
                "$SRC/" "$DEST/"
              echo "  PDFs copiés."
            else
              echo "  Pas de pdf_output, ignoré."
            fi
          done

      - name: Commit et push si des changements existent
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Others/
          git add Alexandre/ Roxane/
          git diff --cached --quiet || git commit -m "ci: sync sous-modules et PDFs [skip ci]"
          git push
